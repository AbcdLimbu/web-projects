<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Color Palettes</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="container">
      <h1 class="page-title">CSS Color Palettes</h1>
      <p class="page-sub">Hover over any swatch to expand it</p>
      <div class="grid">
        <!-- Ocean Blue -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(220, 80%, 25%)"></div>
            <div class="swatch" style="background: hsl(220, 80%, 38%)"></div>
            <div class="swatch" style="background: hsl(220, 80%, 55%)"></div>
            <div class="swatch" style="background: hsl(220, 80%, 72%)"></div>
            <div class="swatch" style="background: hsl(220, 80%, 88%)"></div>
          </div>
          <p class="paletee-name">Ocean Blue</p>
          <p class="palette-sub">hsl(220,80%, ...)</p>
        </div>
        <!-- Rose Pink -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(340, 80%, 25%)"></div>
            <div class="swatch" style="background: hsl(340, 80%, 38%)"></div>
            <div class="swatch" style="background: hsl(340, 80%, 55%)"></div>
            <div class="swatch" style="background: hsl(340, 80%, 72%)"></div>
            <div class="swatch" style="background: hsl(340, 80%, 88%)"></div>
          </div>
          <p class="paletee-name">Rose Pink</p>
          <p class="palette-sub">hsl(340,80%, ...)</p>
        </div>
        <!-- Emerald -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(160, 70%, 25%)"></div>
            <div class="swatch" style="background: hsl(160, 70%, 38%)"></div>
            <div class="swatch" style="background: hsl(160, 70%, 55%)"></div>
            <div class="swatch" style="background: hsl(160, 70%, 72%)"></div>
            <div class="swatch" style="background: hsl(160, 70%, 88%)"></div>
          </div>
          <p class="paletee-name">Emerald</p>
          <p class="palette-sub">hsl(160%, 70%, ...)</p>
        </div>
        <!-- Sunset -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(30, 90%, 25%)"></div>
            <div class="swatch" style="background: hsl(30, 90%, 38%)"></div>
            <div class="swatch" style="background: hsl(30, 90%, 55%)"></div>
            <div class="swatch" style="background: hsl(30, 90%, 72%)"></div>
            <div class="swatch" style="background: hsl(30, 90%, 88%)"></div>
          </div>
          <p class="paletee-name">Sunset</p>
          <p class="palette-sub">hsl(30,90%, ...)</p>
        </div>
        <!-- Purple -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(270, 60%, 25%)"></div>
            <div class="swatch" style="background: hsl(270, 60%, 38%)"></div>
            <div class="swatch" style="background: hsl(270, 60%, 55%)"></div>
            <div class="swatch" style="background: hsl(270, 60%, 72%)"></div>
            <div class="swatch" style="background: hsl(270, 60%, 88%)"></div>
          </div>
          <p class="paletee-name">Purple</p>
          <p class="palette-sub">hsl(270,60%, ...)</p>
        </div>
        <!-- Mono -->
        <div class="palette">
          <div class="swatches">
            <div class="swatch" style="background: hsl(0, 0%, 25%)"></div>
            <div class="swatch" style="background: hsl(0, 0%, 38%)"></div>
            <div class="swatch" style="background: hsl(0, 0%, 55%)"></div>
            <div class="swatch" style="background: hsl(0, 0%, 72%)"></div>
            <div class="swatch" style="background: hsl(0, 0%, 88%)"></div>
          </div>
          <p class="paletee-name">Mono</p>
          <p class="palette-sub">hsl(0,0%, ...)</p>
        </div>
      </div>
    </div>
  </body>
</html>
